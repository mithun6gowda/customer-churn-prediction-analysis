<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Churn Prediction</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
</head>

<body style="background-color:#ddefff;">

<div class="container mt-5">
    <h2 class="text-center">Customer Churn Prediction</h2>
    <form action="{{ url_for('index') }}" method="post">

        <div class="row">

            <div class="col-md-3">
                <label>Tenure</label>
                <input type="text" name="tenure" class="form-control" required>
            </div>

            <div class="col-md-3">
                <label>City Tier</label>
                <input type="text" name="citytier" class="form-control" required>
            </div>

            <div class="col-md-3">
                <label>Warehouse to Home</label>
                <input type="text" name="warehousetohome" class="form-control" required>
            </div>

            <div class="col-md-3">
                <label>Gender</label>
                <select name="gender" class="form-control">
                    <option value="female">Female</option>
                    <option value="male">Male</option>
                </select>
            </div>

        </div>

        <br>

        <div class="row">

            <div class="col-md-3">
                <label>Hours Spend on App</label>
                <input type="text" name="hourspendonapp" class="form-control" required>
            </div>

            <div class="col-md-3">
                <label>Devices Registered</label>
                <input type="text" name="numberofdeviceregistered" class="form-control" required>
            </div>

            <div class="col-md-3">
                <label>Satisfaction Score</label>
                <input type="text" name="satisfactionscore" class="form-control" required>
            </div>

            <div class="col-md-3">
                <label>Marital Status</label>
                <select name="maritalstatus" class="form-control">
                    <option value="single">Single</option>
                    <option value="married">Married</option>
                    <option value="divorced">Divorced</option>
                </select>
            </div>

        </div>

        <br>

        <div class="row">

            <div class="col-md-3">
                <label>Number of Address</label>
                <input type="text" name="numberofaddress" class="form-control" required>
            </div>

            <div class="col-md-3">
                <label>Complain</label>
                <input type="text" name="complain" class="form-control" required>
            </div>

            <div class="col-md-3">
                <label>Order Amount Hike</label>
                <input type="text" name="orderamounthikefromlastyear" class="form-control" required>
            </div>

            <div class="col-md-3">
                <label>Coupon Used</label>
                <input type="text" name="couponused" class="form-control" required>
            </div>

        </div>

        <br>

        <div class="row">

            <div class="col-md-4">
                <label>Order Count</label>
                <input type="text" name="ordercount" class="form-control" required>
            </div>

            <div class="col-md-4">
                <label>Days Since Last Order</label>
                <input type="text" name="daysincelastorder" class="form-control" required>
            </div>

            <div class="col-md-4">
                <label>Cashback Amount</label>
                <input type="text" name="cashbackamount" class="form-control" required>
            </div>

        </div>

        <br>

        <button type="submit" class="btn btn-primary btn-block">Predict</button>

    </form>
</div>

</body>
</html>
